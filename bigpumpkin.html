<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Big Pumpkin Run | Legacy Board</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script type="text/javascript" src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-csv/1.0.21/jquery.csv.min.js"></script>

    <style>
        :root { --pumpkin: #ff7518; --charcoal: #2c3e50; }
        body { font-family: sans-serif; background-color: #fdf2e9; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 10px; border-top: 8px solid var(--pumpkin); shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--pumpkin); }
        
        /* Highlighting */
        .highlight-every-year { background-color: var(--pumpkin) !important; color: white !important; font-weight: bold; }
        .highlight-3-years { background-color: #fff4d1 !important; font-weight: 600; }
        
        /* Make sure the table is visible */
        #legacyTable { width: 100% !important; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎃 Big Pumpkin Run Legacy Board</h1>
    <p style="text-align:center">Search for your name to see your race history (2022-2025)</p>
    
    <table id="legacyTable" class="display">
        <thead>
            <tr>
                <th>Runner Name</th>
                <th>Total Years</th>
                <th>Events</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
$(document).ready(function() {
    console.log("Page loaded, attempting to fetch CSV...");

    $.ajax({
        type: "GET",
        url: "masterlist.csv", // DOUBLE CHECK: Is your file named exactly this?
        dataType: "text",
        success: function(csvData) {
            console.log("CSV Data received successfully.");
            try {
                let data = $.csv.toObjects(csvData);
                
                $('#legacyTable').DataTable({
                    data: data,
                    columns: [
                        { data: 'full_name' },
                        { data: 'years_count' },
                        { data: 'distances' }
                    ],
                    order: [[1, 'desc']],
                    createdRow: function(row, data, dataIndex) {
                        let count = parseInt(data.years_count);
                        if (count >= 4) {
                            $(row).addClass('highlight-every-year');
                            $('td', row).eq(0).append(' <span>★ LEGACY</span>');
                        } else if (count === 3) {
                            $(row).addClass('highlight-3-years');
                        }
                    }
                });
            } catch (e) {
                console.error("Error parsing CSV:", e);
                alert("Error: The CSV file exists but the data format is wrong.");
            }
        },
        error: function(xhr, status, error) {
            console.error("File load error:", status, error);
            alert("CANNOT FIND DATA: Ensure 'masterlist.csv' is uploaded to the same GitHub folder as this HTML file.");
        }
    });
});
</script>

</body>
</html>
