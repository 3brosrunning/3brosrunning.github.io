<style>
    :root {
        --pumpkin-orange: #ff7518;
        --dark-charcoal: #2c3e50;
        --milestone-gold: #fff4d1;
    }

    /* 3 Year Milestone: Subtle Orange/Gold */
    .highlight-3-years { 
        background-color: var(--milestone-gold) !important; 
        font-weight: 600;
        color: var(--dark-charcoal);
    }
    
    /* 4+ Years (Every Year): Bold Pumpkin Orange */
    .highlight-every-year { 
        background-color: var(--pumpkin-orange) !important; 
        color: white !important; 
        font-weight: bold;
        text-transform: uppercase;
    }

    /* General Table Tweaks */
    .container {
        max-width: 1000px;
        margin: 20px auto;
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        border-top: 10px solid var(--pumpkin-orange);
    }
    h1 { text-align: center; color: var(--pumpkin-orange); margin-bottom: 5px; }
    p.status-text { text-align: center; color: #666; margin-bottom: 25px; }
</style>

<div class="container">
    <h1>🎃 Big Pumpkin Run Legacy Board</h1>
    <p class="status-text">Recognizing our runners from 2022 to Present</p>

    <table id="legacyTable" class="display" style="width:100%">
        <thead>
            <tr>
                <th>Runner Name</th>
                <th>Years Participated</th>
                <th>Race Events</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    $(document).ready(function() {
        $.ajax({
            type: "GET",
            url: "masterlist.csv",
            dataType: "text",
            success: function(data) {
                let jsonData = $.csv.toObjects(data);
                
                $('#legacyTable').DataTable({
                    data: jsonData,
                    columns: [
                        { data: 'full_name' },
                        { data: 'years_count' },
                        { data: 'distances' }
                    ],
                    order: [[1, 'desc']], // Highest years at the top
                    pageLength: 25,
                    createdRow: function(row, data, dataIndex) {
                        let count = parseInt(data.years_count);
                        
                        // LOGIC FOR 2026 RELEASE:
                        // 4 Years = Done every year (22, 23, 24, 25)
                        if (count >= 4) {
                            $(row).addClass('highlight-every-year');
                            // Add a "Legacy" tag to the name for extra flair
                            let nameCell = $('td', row).eq(0);
                            nameCell.html(nameCell.html() + ' <small>★ LEGACY</small>');
                        } 
                        // 3 Years = Milestone
                        else if (count === 3) {
                            $(row).addClass('highlight-3-years');
                        }
                    }
                });
            }
        });
    });
</script>
