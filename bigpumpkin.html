<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Big Pumpkin Run Legacy Runners</title>
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700,900" />
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

    <style>
        :root {
            --rsu-teal: #004d61;
            --rsu-orange: #ff6e40;
            --gold: #FFD700;
            --silver: #e0e0e0;
            --rsu-bg: #f4f4f4;
        }

        body { font-family: "Roboto", sans-serif; margin: 0; background-color: var(--rsu-bg); color: #333; }

        .rsu-header-mock {
            background: #fff;
            padding: 15px 20px;
            border-bottom: 1px solid #ddd;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .rsu-logo { height: 45px; }
        .site-title { font-weight: 700; color: var(--rsu-teal); margin-left: 15px; font-size: 1.2rem; }

        .rsu-banner {
            background-color: var(--rsu-teal);
            color: white;
            padding: 50px 20px;
            text-align: center;
            border-bottom: 5px solid var(--rsu-orange);
        }
        .rsu-banner h1 { font-size: 2.5rem; margin: 0; font-weight: 900; text-transform: uppercase; }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

        .search-area { margin: 30px 0; text-align: center; }
        #runnerSearch {
            width: 100%;
            max-width: 500px;
            padding: 15px 25px;
            font-size: 1.1rem;
            border: 2px solid #ddd;
            border-radius: 50px;
            outline: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        #runnerList {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 80px;
        }

        .runner-card {
            background: white;
            border-radius: 15px;
            padding: 50px 20px 40px;
            text-align: center;
            position: relative;
            border: 1px solid #eee;
            transition: transform 0.2s;
        }
        
        /* 4-Year Highlight (Gold) */
        .tier-4 { 
            background: #fffdf0 !important; 
            border: 3px solid var(--gold) !important; 
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.2);
        }

        /* 3-Year Highlight (Orange/Silver) */
        .tier-3 { 
            border: 3px solid var(--rsu-orange) !important;
            box-shadow: 0 4px 12px rgba(255, 110, 64, 0.1);
        }

        .runner-name { font-weight: 900; font-size: 1.5rem; color: var(--rsu-teal); margin-bottom: 5px; }
        .runner-count { color: var(--rsu-orange); font-weight: 900; font-size: 4.5rem; margin: 0; line-height: 1; }
        .sub-label { font-size: 0.9rem; font-weight: 700; color: #777; text-transform: uppercase; margin-top: 10px; }

        .badge {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            padding: 6px 18px;
            font-size: 0.8rem;
            font-weight: 900;
            border-radius: 50px;
            text-transform: uppercase;
            white-space: nowrap;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .badge-4 { background: var(--gold); color: #000; }
        .badge-3 { background: var(--rsu-orange); color: white; }

        .floating-register {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--rsu-orange);
            color: white;
            padding: 16px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 900;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            z-index: 2000;
            text-transform: uppercase;
            border: 2px solid white;
        }
    </style>
</head>
<body>

    <div class="rsu-header-mock">
        <img src="https://d368g9lw5ileu7.cloudfront.net/uploads/generic/genericImage-websiteLogo-138943-1774339167.6858-0.bPWKrF.png" class="rsu-logo" alt="Logo">
        <div class="site-title">The Big Pumpkin Run</div>
    </div>

    <header class="rsu-banner">
        <h1>Legacy Runners</h1>
        <p>Celebrating the years you've run with us.</p>
    </header>

    <div class="container">
        <div class="search-area">
            <input type="text" id="runnerSearch" placeholder="Search for your name...">
        </div>

        <div id="runnerList">Searching the pumpkin patch...</div>
    </div>

    <a href="https://runsignup.com/Race/TX/PortArthur/TheBigPumpkinRun" class="floating-register">Register for 2026</a>

    <script>
        let allRunners = [];

        function render(data) {
            const list = document.getElementById("runnerList");
            if (data.length === 0) {
                list.innerHTML = "<p style='grid-column:1/-1; text-align:center;'>No matching legacy runners found.</p>";
                return;
            }

            list.innerHTML = data.map(r => {
                let badge = "";
                let tierClass = "";
                const count = parseInt(r.years_count);

                if (count >= 4) {
                    badge = '<span class="badge badge-4">4-Year Legacy</span>';
                    tierClass = "tier-4";
                } else if (count === 3) {
                    badge = '<span class="badge badge-3">3-Year Milestone</span>';
                    tierClass = "tier-3";
                }

                return `
                    <div class="runner-card ${tierClass}">
                        ${badge}
                        <div class="runner-name">${r.full_name}</div>
                        <div class="runner-count">${r.years_count}</div>
                        <div class="sub-label">Years Completed</div>
                    </div>
                `;
            }).join('');
        }

        Papa.parse("masterlist.csv", {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                // Sorting by years (highest to lowest), then alphabetically
                allRunners = results.data
                    .filter(r => r.full_name && r.years_count)
                    .sort((a, b) => parseInt(b.years_count) - parseInt(a.years_count) || a.full_name.localeCompare(b.full_name));

                render(allRunners);
            }
        });

        document.getElementById("runnerSearch").addEventListener("input", function() {
            const term = this.value.toLowerCase().trim();
            render(allRunners.filter(r => r.full_name.toLowerCase().includes(term)));
        });
    </script>
</body>
</html>
