<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Big Pumpkin Run Legacy Runners</title>
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <meta name="theme-color" content="#004d61">

    <meta property="og:title" content="Big Pumpkin Run Legacy Runners">
    <meta property="og:description" content="A heartfelt thank you to the runners who make this tradition possible. Join us in Port Arthur!">
    <meta property="og:image" content="https://d368g9lw5ileu7.cloudfront.net/uploads/generic/genericImage-websiteLogo-138943-1774339167.6858-0.bPWKrF.png">

    <style>
        :root { --rsu-teal: #004d61; --rsu-orange: #ff6e40; --gold: #FFD700; --rsu-bg: #f4f7f6; }
        body { font-family: sans-serif; margin: 0; background-color: var(--rsu-bg); color: #333; }
        .rsu-header-mock { background: #fff; padding: 10px 20px; border-bottom: 1px solid #ddd; display: flex; align-items: center; position: sticky; top: 0; z-index: 1000; height: 50px; }
        .rsu-logo { height: 40px; margin-right: 15px; }
        .site-title { font-weight: 700; color: var(--rsu-teal); text-transform: uppercase; font-size: 1.1rem; }
        .rsu-banner { background-color: var(--rsu-teal); color: white; padding: 40px 20px; text-align: center; border-bottom: 5px solid var(--rsu-orange); }
        .rsu-banner h1 { font-size: 2.2rem; margin: 0 0 10px; font-weight: 900; text-transform: uppercase; }
        .heartfelt-msg { max-width: 800px; margin: 0 auto; line-height: 1.4; font-size: 1rem; opacity: 0.9; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .toolbar { background: white; padding: 20px; border-radius: 12px; margin-top: -30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; position: relative; z-index: 10; }
        .toolbar-logo { height: 50px; margin: 0 auto 10px; display: block; }
        #runnerSearch { width: 100%; max-width: 450px; padding: 12px 20px; border-radius: 50px; border: 2px solid #eee; font-size: 1rem; outline: none; }
        #runnerList { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin: 30px 0; }
        .runner-card { background: white; border-radius: 12px; padding: 35px 20px 20px; text-align: center; position: relative; border: 1px solid #eee; min-height: 250px; contain: layout; }
        .tier-gold { background: #fffdf0 !important; border: 2px solid var(--gold) !important; }
        .tier-standard { border-top: 4px solid var(--rsu-orange); }
        .badge { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); padding: 4px 12px; font-size: 0.7rem; font-weight: 900; border-radius: 4px; text-transform: uppercase; }
        .badge-gold { background: var(--gold); color: #000; }
        .badge-standard { background: #333; color: #fff; }
        .name { font-weight: 900; font-size: 1.3rem; margin-bottom: 5px; }
        .main-stat { font-size: 2.8rem; font-weight: 900; color: var(--rsu-orange); margin: 0; }
        .sub-label { font-size: 0.75rem; font-weight: 700; color: #888; text-transform: uppercase; margin-bottom: 10px; }
        .history-box { background: rgba(0,0,0,0.03); padding: 10px; border-radius: 6px; font-size: 0.8rem; margin-bottom: 15px; min-height: 35px; }
        .share-btn { background: #fff; border: 1.5px solid #d3d9db; padding: 8px 16px; border-radius: 50px; font-size: 0.7rem; font-weight: 700; color: #555; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; text-transform: uppercase; }
        .share-btn svg { width: 12px; height: 12px; stroke: currentColor; stroke-width: 2.5; fill: none; }
        .floating-register { position: fixed; bottom: 20px; right: 20px; background: var(--rsu-orange); color: white; padding: 12px 20px; border-radius: 50px; text-decoration: none; font-weight: 900; box-shadow: 0 5px 15px rgba(0,0,0,0.2); z-index: 1000; font-size: 0.8rem; text-transform: uppercase; }
    </style>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:400,700,900&display=swap" media="print" onload="this.media='all'">
</head>
<body>

<div class="rsu-header-mock">
    <a href="https://runsignup.com/Race/TX/PortArthur/TheBigPumpkinRun" style="text-decoration:none; display:flex; align-items:center;">
        <img src="https://d368g9lw5ileu7.cloudfront.net/uploads/generic/genericImage-websiteLogo-138943-1774339167.6858-0.bPWKrF.png" class="rsu-logo" alt="Logo">
        <div class="site-title">The Big Pumpkin Run</div>
    </a>
</div>

<header class="rsu-banner">
    <h1>Legacy Runners</h1>
    <p class="heartfelt-msg">Without these runners, we couldn't keep hosting these races. It is through your dedication that we keep this tradition alive.</p>
</header>

<div class="container">
    <div class="toolbar">
        <img src="favicon.ico" class="toolbar-logo" alt="Logo">
        <input type="text" id="runnerSearch" placeholder="Search for your name...">
        <div style="font-size:0.8rem; font-weight:700; color:#666; margin-top:10px; text-transform:uppercase;">
            <span id="legacyCount">0</span> Runners | <span id="yearsCombined">0</span> Combined Years
        </div>
    </div>
    
    <div id="runnerList">Searching...</div>
</div>

<a href="https://runsignup.com/Race/TX/PortArthur/TheBigPumpkinRun" class="floating-register">Register Now</a>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script>
    let allRunners = [];
    const listEl = document.getElementById("runnerList");

    function createCard(r) {
        const count = parseInt(r.years_count) || 0;
        const tierClass = count >= 4 ? "tier-gold" : "tier-standard";
        const badgeClass = count >= 4 ? "badge-gold" : "badge-standard";
        const badgeText = count >= 4 ? "4-Year Legend" : (count === 3 ? "3-Year Milestone" : "Legacy Runner");

        return `
            <div class="runner-card ${tierClass}">
                <div class="badge ${badgeClass}">${badgeText}</div>
                <div class="name">${r.full_name}</div>
                <div class="main-stat">${count}</div>
                <div class="sub-label">Years</div>
                <div class="history-box">${r.clean_distances}</div>
                <button class="share-btn" onclick="shareRunner('${r.full_name.replace(/'/g, "\\'")}', ${count})">
                    <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                    Share
                </button>
            </div>`;
    }

    // Chunked rendering to prevent browser freeze
    function render(data) {
        listEl.innerHTML = "";
        if (data.length === 0) { listEl.innerHTML = "<p>No results found.</p>"; return; }
        
        const chunk = 20;
        let index = 0;

        function doRender() {
            const end = Math.min(index + chunk, data.length);
            let html = "";
            for (let i = index; i < end; i++) {
                html += createCard(data[i]);
            }
            listEl.insertAdjacentHTML('beforeend', html);
            index = end;
            if (index < data.length) requestAnimationFrame(doRender);
        }
        doRender();
    }

    function shareRunner(name, years) {
        const url = new URL(window.location.href);
        url.searchParams.set('runner', name);
        const text = `I've completed ${years} years at the Big Pumpkin Run! Join me in Port Arthur: https://runsignup.com/Race/TX/PortArthur/TheBigPumpkinRun`;
        if (navigator.share) { navigator.share({ title: 'Legacy', text: text, url: url.toString() }); }
        else { navigator.clipboard.writeText(text + " " + url.toString()); alert("Copied!"); }
    }

    Papa.parse("masterlist.csv", {
        download: true, header: true, skipEmptyLines: true,
        complete: function(results) {
            let totalYears = 0;
            allRunners = results.data.map(r => {
                const c = parseInt(r.years_count) || 0;
                totalYears += c;
                r.clean_distances = (r.distances || "").replace(/The Big Pumpkin Run 5k 2023|The Big Pumpkin Run Kids K 2023/gi, '').split(',').map(s => s.trim()).filter(s => s).join(', ');
                return r;
            }).sort((a, b) => parseInt(b.years_count) - parseInt(a.years_count) || a.full_name.localeCompare(b.full_name));

            document.getElementById('legacyCount').innerText = allRunners.length;
            document.getElementById('yearsCombined').innerText = totalYears;

            const urlParams = new URLSearchParams(window.location.search);
            const runnerParam = urlParams.get('runner');
            if (runnerParam) {
                document.getElementById('runnerSearch').value = runnerParam;
                render(allRunners.filter(r => r.full_name.toLowerCase().includes(runnerParam.toLowerCase())));
            } else { render(allRunners); }
        }
    });

    // Debounced search
    let timeout;
    document.getElementById("runnerSearch").addEventListener("input", function() {
        clearTimeout(timeout);
        const term = this.value.toLowerCase().trim();
        timeout = setTimeout(() => {
            render(allRunners.filter(r => r.full_name.toLowerCase().includes(term)));
        }, 150);
    });
</script>
</body>
</html>
