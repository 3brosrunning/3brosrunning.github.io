<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seabrook Lucky Trails | Legacy Leaderboard</title>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2e7d32; 
            --accent: #ff5722;  
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        header { background: var(--primary); color: white; padding: 60px 20px; text-align: center; clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%); }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        .toolbar { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); margin-top: -40px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        #runnerSearch { width: 100%; max-width: 500px; padding: 15px 25px; border: 2px solid #e2e8f0; border-radius: 99px; font-size: 16px; transition: all 0.3s; }
        .filter-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }

        .btn { padding: 10px 18px; border: 1px solid #e2e8f0; border-radius: 12px; background: white; cursor: pointer; font-weight: 600; font-size: 14px; transition: all 0.2s; }
        .btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        #runnerList { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 25px; margin-top: 40px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 30px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); transition: transform 0.3s ease; border: 1px solid #f1f5f9; }
        .card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }

        .tier-tag { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; padding: 4px 10px; border-radius: 6px; margin-bottom: 15px; display: inline-block; }
        .tag-legend { background: #fef3c7; color: #92400e; } 
        .tag-veteran { background: #dcfce7; color: #166534; } 
        .tag-legacy { background: #e0f2fe; color: #075985; } 

        .name { font-size: 22px; font-weight: 800; margin-bottom: 5px; }
        .stat-highlight { font-size: 28px; font-weight: 800; color: var(--accent); margin: 10px 0; }
        .sub-stat { font-size: 14px; color: #64748b; margin-bottom: 20px; font-weight: 600; }

        .history-box { background: #f8fafc; border-radius: 12px; padding: 15px; max-height: 180px; overflow-y: auto; border: 1px solid #edf2f7; }
        .history-line { font-size: 13px; padding: 6px 0; border-bottom: 1px solid #e2e8f0; color: #475569; }
        .history-line:last-child { border-bottom: none; }
    </style>
</head>
<body>

<header>
    <div class="container">
        <h1>Seabrook Legacy Leaderboard</h1>
        <p style="opacity: 0.9;">Celebrating every mile since 2004</p>
    </div>
</header>

<div class="container">
    <div class="toolbar">
        <input type="text" id="runnerSearch" placeholder="Find a legend by name...">
        <div class="filter-group">
            <button class="btn active" data-filter="all">Lifetime Loyalty</button>
            <button class="btn" data-filter="Full">Marathons</button>
            <button class="btn" data-filter="Half">Half Marathons</button>
            <button class="btn" data-filter="Trail Challenge">Trail Challenges</button>
            <button class="btn" data-filter="Pelican Challenge">Pelican Challenges</button>
            <button class="btn" data-filter="5k">5k Runs</button>
            <button class="btn" data-filter="Quarter">Quarter</button>
        </div>
    </div>
    <div id="runnerList">Loading legacy data...</div>
</div>

<script>
    let groupedRunners = {};
    let currentFilter = 'all';
    let searchTerm = '';

    // Step 1: Load and Group the Master CSV
    // Ensure this filename matches your CSV in GitHub
    Papa.parse("Seabrook_race_history_database.csv", {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            processData(results.data);
            render();
        }
    });

    function processData(rawData) {
        groupedRunners = {};
        rawData.forEach(row => {
            const name = row['Runner Name'];
            if (!groupedRunners[name]) {
                groupedRunners[name] = {
                    name: name,
                    races: [],
                    totalYears: new Set(),
                    trailCount: 0,
                    pelicanCount: 0
                };
            }
            groupedRunners[name].races.push(row);
            groupedRunners[name].totalYears.add(row.Year);
            
            // Check for unique challenge awards per year
            if (row.Challenges.includes("Trail Challenge")) groupedRunners[name].trailCount++;
            if (row.Challenges.includes("Pelican Challenge")) groupedRunners[name].pelicanCount++;
        });
    }

    function render() {
        const list = document.getElementById('runnerList');
        const runnerArray = Object.values(groupedRunners);

        const filtered = runnerArray.map(r => {
            let score = 0;
            let unit = "";
            let displayRaces = [];

            if (currentFilter === 'all') {
                score = r.totalYears.size;
                unit = "Years Active";
                displayRaces = r.races;
            } else if (currentFilter === 'Trail Challenge') {
                // Count unique years they got this challenge
                const uniqueTrailYears = [...new Set(r.races.filter(race => race.Challenges.includes("Trail Challenge")).map(race => race.Year))];
                score = uniqueTrailYears.length;
                unit = "Trail Challenges";
                displayRaces = r.races.filter(race => race.Challenges.includes("Trail Challenge"));
            } else if (currentFilter === 'Pelican Challenge') {
                const uniquePelicanYears = [...new Set(r.races.filter(race => race.Challenges.includes("Pelican Challenge")).map(race => race.Year))];
                score = uniquePelicanYears.length;
                unit = "Pelican Challenges";
                displayRaces = r.races.filter(race => race.Challenges.includes("Pelican Challenge"));
            } else {
                displayRaces = r.races.filter(race => race.Category.includes(currentFilter));
                score = displayRaces.length;
                unit = currentFilter + " Finishes";
            }

            return { ...r, score, unit, displayRaces };
        }).filter(r => {
            const nameMatch = r.name.toLowerCase().includes(searchTerm.toLowerCase());
            return nameMatch && r.score > 0;
        });

        filtered.sort((a, b) => b.score - a.score || a.name.localeCompare(b.name));

        list.innerHTML = filtered.map(runner => {
            let tag = "";
            const y = runner.totalYears.size;
            if (y >= 15) tag = `<span class="tier-tag tag-legend">Legacy Legend</span>`;
            else if (y >= 10) tag = `<span class="tier-tag tag-veteran">10-Year Veteran</span>`;
            else if (y >= 5) tag = `<span class="tier-tag tag-legacy">5-Year Loyalty</span>`;

            return `
                <div class="card">
                    ${tag}
                    <div class="name">${runner.name}</div>
                    <div class="stat-highlight">${runner.score}</div>
                    <div class="sub-stat">${runner.unit}</div>
                    <div class="history-box">
                        ${runner.displayRaces.map(race => `
                            <div class="history-line"><strong>${race.Year}</strong>: ${race.Event}</div>
                        `).join('')}
                    </div>
                </div>
            `;
        }).join('');
    }

    document.getElementById('runnerSearch').addEventListener('input', e => {
        searchTerm = e.target.value;
        render();
    });

    document.querySelectorAll('.btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentFilter = this.dataset.filter;
            render();
        });
    });
</script>

</body>
</html>
