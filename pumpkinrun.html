<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Legacy Board | The Official Big Pumpkin Run 2026</title>
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">
    
    <meta property="og:title" content="Big Pumpkin Run Legacy & Champions">
    <meta property="og:description" content="Check out the legends of the Big Pumpkin Run! See who has been running with us since 2022.">
    <meta property="og:image" content="https://d368g9lw5ileu7.cloudfront.net/uploads/generic/genericImage-websiteLogo-138943-1774339167.6858-0.bPWKrF.png">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700,900" />
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

    <style>
        :root {
            --rsu-teal: #004d61;
            --rsu-orange: #ff6e40;
            --gold: #FFD700;
            --rsu-bg: #f4f4f4;
        }

        body { font-family: "Roboto", sans-serif; margin: 0; background-color: var(--rsu-bg); color: #333; }

        /* Header Mock */
        .rsu-header-mock {
            background: #fff;
            padding: 15px 20px;
            border-bottom: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .rsu-logo-link { display: flex; align-items: center; text-decoration: none; }
        .rsu-logo { height: 45px; cursor: pointer; }
        .site-title { font-weight: 500; color: var(--rsu-teal); margin-left: 15px; }

        /* Banner */
        .rsu-banner {
            background-color: var(--rsu-teal);
            color: white;
            padding: 70px 20px;
            text-align: center;
            border-bottom: 5px solid var(--rsu-orange);
        }
        .rsu-banner h1 { font-size: 2.4rem; margin: 0; font-weight: 700; text-transform: uppercase; }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

        /* Search area */
        .search-area { margin: 40px 0; text-align: center; }
        #runnerSearch {
            width: 100%;
            max-width: 550px;
            padding: 16px 25px;
            font-size: 1.1rem;
            border: 2px solid #ddd;
            border-radius: 50px;
            outline: none;
        }
        #runnerSearch:focus { border-color: var(--rsu-orange); }

        /* Grid */
        #runnerList {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 100px;
        }

        /* Card Tiers */
        .runner-card {
            background: white;
            border-radius: 12px;
            padding: 40px 20px 25px;
            text-align: center;
            position: relative;
            border: 1px solid #eee;
            transition: transform 0.2s;
        }
        
        /* Gold Highlight for Overall Leader */
        .tier-leader { 
            background: #fffdf0 !important; 
            border: 3px solid var(--gold) !important; 
            box-shadow: 0 8px 20px rgba(212,175,55,0.3);
        }

        .runner-name { font-weight: 900; font-size: 1.4rem; color: var(--rsu-teal); margin-bottom: 5px; }
        .runner-count { color: var(--rsu-orange); font-weight: 900; font-size: 2rem; margin: 5px 0; }
        .sub-label { font-size: 0.8rem; font-weight: 700; color: #888; text-transform: uppercase; margin-bottom: 15px; }

        /* Badges */
        .badge {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            padding: 5px 15px;
            font-size: 0.75rem;
            font-weight: 900;
            border-radius: 4px;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .badge-leader { background: var(--gold); color: #000; }
        .badge-legacy { background: var(--rsu-orange); color: white; }
        .badge-milestone { background: #ffc107; color: #333; }

        /* Share Button */
        .share-btn {
            margin-top: 15px;
            background: none;
            border: 1px solid #ddd;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #777;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .share-btn:hover { background: #f9f9f9; color: var(--rsu-teal); }

        .floating-register {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--rsu-orange);
            color: white;
            padding: 16px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 900;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            z-index: 2000;
            border: 2px solid white;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="rsu-header-mock">
        <a href="https://runsignup.com/Race/TX/PortArthur/TheBigPumpkinRun" class="rsu-logo-link">
            <img src="https://d368g9lw5ileu7.cloudfront.net/uploads/generic/genericImage-websiteLogo-138943-1774339167.6858-0.bPWKrF.png" class="rsu-logo" alt="Logo">
            <div class="site-title">The Official Big Pumpkin Run 2026</div>
        </a>
    </div>

    <header class="rsu-banner">
        <h1>Legacy & Champions</h1>
        <p>A tradition built by you, since 2022.</p>
    </header>

    <div class="container">
        <div class="search-area">
            <input type="text" id="runnerSearch" placeholder="Search for a runner...">
        </div>

        <div id="runnerList">Loading our champions...</div>
    </div>

    <a href="https://runsignup.com/Race/TX/PortArthur/TheBigPumpkinRun" class="floating-register">Register Now</a>

    <script>
        let allRunners = [];
        const LEGACY_THRESHOLD = 4;

        function render(data) {
            const list = document.getElementById("runnerList");
            if (data.length === 0) {
                list.innerHTML = "<p style='width:100%; text-align:center;'>No matching legacy runners found.</p>";
                return;
            }

            // Find max years for leader highlight
            const maxYears = data.length > 0 ? Math.max(...allRunners.map(r => parseInt(r.years_count))) : 0;

            list.innerHTML = data.map(r => {
                const years = parseInt(r.years_count);
                let badge = "";
                let tierClass = "";

                if (years === maxYears && maxYears > 0) {
                    badge = '<span class="badge badge-leader">Overall Leader</span>';
                    tierClass = "tier-leader";
                } else if (years >= LEGACY_THRESHOLD) {
                    badge = '<span class="badge badge-legacy">Original Legacy</span>';
                    tierClass = "tier-legacy";
                } else if (years === 3) {
                    badge = '<span class="badge badge-milestone">3 Year Milestone</span>';
                }

                // Inline Style for Legacy Border if not gold
                const borderStyle = (years >= LEGACY_THRESHOLD && years < maxYears) ? 'border: 2px solid var(--rsu-orange)' : '';

                return `
                    <div class="runner-card ${tierClass}" style="${borderStyle}">
                        ${badge}
                        <div class="runner-name">${r.full_name}</div>
                        <div class="runner-count">${years}</div>
                        <div class="sub-label">Years Completed</div>
                        <div style="font-size: 0.85rem; color: #888;">${r.distances}</div>
                        <button class="share-btn" onclick="shareRunner('${r.full_name.replace(/'/g, "\\'")}')">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                            Share My Legacy
                        </button>
                    </div>
                `;
            }).join('');
        }

        // Share Logic
        function shareRunner(name) {
            const url = new URL(window.location.href);
            url.searchParams.set('runner', name);
            const shareUrl = url.toString();
            const text = `I'm officially on the Big Pumpkin Run Legacy Board! Join the tradition at: https://runsignup.com/Race/TX/PortArthur/TheBigPumpkinRun`;

            if (navigator.share) {
                navigator.share({ title: 'Big Pumpkin Run Legacy', text: text, url: shareUrl });
            } else {
                navigator.clipboard.writeText(shareUrl);
                alert("Link copied! Share this with your friends to show your legacy.");
            }
        }

        Papa.parse("masterlist.csv", {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                allRunners = results.data.sort((a,b) => {
                    return parseInt(b.years_count) - parseInt(a.years_count) || a.full_name.localeCompare(b.full_name);
                });

                // Check for shared link
                const urlParams = new URLSearchParams(window.location.search);
                const runnerParam = urlParams.get('runner');
                if (runnerParam) {
                    document.getElementById('runnerSearch').value = runnerParam;
                    const filtered = allRunners.filter(r => r.full_name.toLowerCase().includes(runnerParam.toLowerCase()));
                    render(filtered);
                } else {
                    render(allRunners);
                }
            }
        });

        document.getElementById("runnerSearch").addEventListener("input", function() {
            const term = this.value.toLowerCase().trim();
            const filtered = allRunners.filter(r => r.full_name.toLowerCase().includes(term));
            render(filtered);
        });
    </script>
</body>
</html>
