<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Big Pumpkin Run Legacy Runners</title>
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700,900" />
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

    <style>
        :root {
            --rsu-teal: #004d61;
            --rsu-orange: #ff6e40;
            --gold: #FFD700;
            --rsu-bg: #f4f4f4;
        }

        body { font-family: "Roboto", sans-serif; margin: 0; background-color: var(--rsu-bg); color: #333; }

        .rsu-header-mock {
            background: #fff;
            padding: 15px 20px;
            border-bottom: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .rsu-logo { height: 45px; }
        .site-title { font-weight: 500; color: var(--rsu-teal); margin-left: 15px; text-decoration: none; }

        .rsu-banner {
            background-color: var(--rsu-teal);
            color: white;
            padding: 50px 20px;
            text-align: center;
            border-bottom: 5px solid var(--rsu-orange);
        }
        .rsu-banner h1 { font-size: 2.5rem; margin: 0; font-weight: 900; text-transform: uppercase; }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

        .search-area { margin: 30px 0; text-align: center; }
        #runnerSearch {
            width: 100%;
            max-width: 500px;
            padding: 15px 25px;
            font-size: 1.1rem;
            border: 2px solid #ddd;
            border-radius: 50px;
            outline: none;
        }

        #runnerList {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 80px;
        }

        .runner-card {
            background: white;
            border-radius: 12px;
            padding: 40px 20px 25px;
            text-align: center;
            position: relative;
            border: 1px solid #eee;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        .tier-leader { 
            background: #fffdf0 !important; 
            border: 3px solid var(--gold) !important; 
        }

        .runner-name { font-weight: 900; font-size: 1.4rem; color: var(--rsu-teal); margin-bottom: 5px; }
        .runner-count { color: var(--rsu-orange); font-weight: 900; font-size: 3rem; margin: 0; }
        .sub-label { font-size: 0.8rem; font-weight: 700; color: #888; text-transform: uppercase; margin-bottom: 15px; }

        .history-box {
            font-size: 0.9rem;
            font-weight: 600;
            color: #555;
            background: #f9f9f9;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #eee;
            line-height: 1.4;
            text-align: left;
        }

        .history-item { border-bottom: 1px solid #eee; padding: 4px 0; }
        .history-item:last-child { border-bottom: none; }
        .hist-year { color: var(--rsu-teal); font-weight: 900; margin-right: 8px; }

        .badge {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            padding: 6px 16px;
            font-size: 0.75rem;
            font-weight: 900;
            border-radius: 50px;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .badge-leader { background: var(--gold); color: #000; }
        .badge-milestone { background: #ffc107; color: #000; }

        .floating-register {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--rsu-orange);
            color: white;
            padding: 16px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 900;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            z-index: 2000;
        }
    </style>
</head>
<body>

    <div class="rsu-header-mock">
        <a href="https://runsignup.com/Race/TX/PortArthur/TheBigPumpkinRun" class="rsu-logo-link" style="display:flex; align-items:center; text-decoration:none;">
            <img src="https://d368g9lw5ileu7.cloudfront.net/uploads/generic/genericImage-websiteLogo-138943-1774339167.6858-0.bPWKrF.png" class="rsu-logo" alt="Logo">
            <div class="site-title">The Big Pumpkin Run</div>
        </a>
    </div>

    <header class="rsu-banner">
        <h1>Legacy Runners</h1>
        <p>A tradition built by you, since 2022.</p>
    </header>

    <div class="container">
        <div class="search-area">
            <input type="text" id="runnerSearch" placeholder="Search for your name...">
        </div>

        <div id="runnerList">Loading legends...</div>
    </div>

    <a href="https://runsignup.com/Race/TX/PortArthur/TheBigPumpkinRun" class="floating-register">Register for 2026</a>

    <script>
        let allRunners = [];

        function render(data) {
            const list = document.getElementById("runnerList");
            if (data.length === 0) {
                list.innerHTML = "<p style='grid-column:1/-1; text-align:center;'>No matching legacy runners found.</p>";
                return;
            }

            const maxYears = Math.max(...allRunners.map(r => r.actual_count));

            list.innerHTML = data.map(r => {
                let badge = "";
                let tierClass = "";

                if (r.actual_count === maxYears && maxYears > 1) {
                    badge = '<span class="badge badge-leader">Overall Leader</span>';
                    tierClass = "tier-leader";
                } else if (r.actual_count >= 3) {
                    badge = '<span class="badge badge-milestone">Multi-Year Champion</span>';
                }

                // Create HTML for the history lines
                const historyHtml = r.clean_history.map(item => 
                    `<div class="history-item"><span class="hist-year">${item.year}</span> ${item.event}</div>`
                ).join('');

                return `
                    <div class="runner-card ${tierClass}">
                        ${badge}
                        <div class="runner-name">${r.full_name}</div>
                        <div class="runner-count">${r.actual_count}</div>
                        <div class="sub-label">Years Completed</div>
                        <div class="history-box">
                            ${historyHtml}
                        </div>
                    </div>
                `;
            }).join('');
        }

        Papa.parse("masterlist.csv", {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                allRunners = results.data.map(r => {
                    // split the comma-separated list of races
                    const rawEvents = r.distances.split(',').map(s => s.trim());
                    
                    let history = [];
                    let foundYears = new Set();

                    rawEvents.forEach(eventStr => {
                        // 1. Extract the year (4 digits)
                        const yearMatch = eventStr.match(/\d{4}/);
                        const year = yearMatch ? yearMatch[0] : "Unknown";
                        
                        // 2. Clean the string: Remove the year and extra spaces
                        // This turns "The Big Pumpkin Run 5k 2023" -> "The Big Pumpkin Run 5k"
                        let cleanEvent = eventStr.replace(/\d{4}/g, '').replace(/\s+/g, ' ').trim();
                        
                        // Standardize the name to "The Big Pumpkin Run" if it's missing "The"
                        if (cleanEvent.startsWith("Big Pumpkin")) {
                            cleanEvent = "The " + cleanEvent;
                        }

                        history.push({ year: year, event: cleanEvent });
                        if (yearMatch) foundYears.add(year);
                    });

                    // Sort history by year
                    history.sort((a, b) => a.year - b.year);

                    r.clean_history = history;
                    r.actual_count = foundYears.size;
                    return r;
                }).sort((a, b) => b.actual_count - a.actual_count || a.full_name.localeCompare(b.full_name));

                render(allRunners);
            }
        });

        document.getElementById("runnerSearch").addEventListener("input", function() {
            const term = this.value.toLowerCase().trim();
            render(allRunners.filter(r => r.full_name.toLowerCase().includes(term)));
        });
    </script>
</body>
</html>
